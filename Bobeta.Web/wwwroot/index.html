<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bobeta.Web</title>
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/tailwind.css" />
    <!-- If you add any scoped CSS files, uncomment the following to load them
    <link href="Bobeta.Web.styles.css" rel="stylesheet" /> -->
    <!-- Manifest path varies when Azure deploy uses publish root vs publish/wwwroot contents only; probe common URLs. -->
    <script>
        (function () {
            var paths = ['/manifest.webmanifest', '/wwwroot/manifest.webmanifest'];
            function tryNext(i) {
                if (i >= paths.length) return;
                var p = paths[i];
                var url = location.origin + p;
                fetch(url, { method: 'GET', cache: 'no-store' }).then(function (r) {
                    if (r.ok) {
                        var lnk = document.createElement('link');
                        lnk.rel = 'manifest';
                        lnk.href = p;
                        document.head.appendChild(lnk);
                    } else tryNext(i + 1);
                }).catch(function () { tryNext(i + 1); });
            }
            tryNext(0);
        })();
    </script>
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>
        if (!location.hostname.includes('localhost') && !location.hostname.startsWith('127.'))
            navigator.serviceWorker.register('service-worker.js?v=3', { updateViaCache: 'none' });
    </script>
</body>

</html>
