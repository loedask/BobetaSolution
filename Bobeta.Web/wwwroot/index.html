<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bobeta — Play Smart. Win Real Money.</title>
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/tailwind.css" />
    <link rel="stylesheet" href="_content/Bobeta.Landing/css/landing.css" />
    <!-- If you add any scoped CSS files, uncomment the following to load them
    <link href="Bobeta.Web.styles.css" rel="stylesheet" /> -->
    <!-- Root-absolute path: works for any client route when <base href="/" /> is set. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        window.bobeta = {
            getBrowserLanguage: function () {
                return navigator.language || navigator.userLanguage || null;
            },
            // Join Game live list: refresh when the tab becomes visible again.
            onVisibilityVisible: function (dotNetRef) {
                if (this._visibilityHandler) {
                    document.removeEventListener('visibilitychange', this._visibilityHandler);
                    this._visibilityHandler = null;
                }
                this._visibilityHandler = function () {
                    if (document.visibilityState === 'visible')
                        dotNetRef.invokeMethodAsync('OnTabBecameVisible');
                };
                document.addEventListener('visibilitychange', this._visibilityHandler);
            },
            clearVisibilityVisible: function () {
                if (this._visibilityHandler) {
                    document.removeEventListener('visibilitychange', this._visibilityHandler);
                    this._visibilityHandler = null;
                }
            },
            // Landing: keep the menu docked while scrolling, with a soft progress glow.
            bindLandingHeader: function (headerId) {
                this.clearLandingHeader();
                var header = document.getElementById(headerId);
                if (!header)
                    return;

                var ticking = false;
                var update = function () {
                    ticking = false;
                    var y = window.scrollY || document.documentElement.scrollTop || 0;
                    var max = Math.max(
                        1,
                        (document.documentElement.scrollHeight || document.body.scrollHeight) - window.innerHeight
                    );
                    var progress = Math.min(1, Math.max(0, y / max));
                    header.classList.toggle('lp-header--docked', y > 28);
                    header.style.setProperty('--lp-scroll', progress.toFixed(4));
                };

                this._landingScrollHandler = function () {
                    if (ticking)
                        return;
                    ticking = true;
                    window.requestAnimationFrame(update);
                };

                window.addEventListener('scroll', this._landingScrollHandler, { passive: true });
                window.addEventListener('resize', this._landingScrollHandler, { passive: true });
                update();
            },
            clearLandingHeader: function () {
                if (this._landingScrollHandler) {
                    window.removeEventListener('scroll', this._landingScrollHandler);
                    window.removeEventListener('resize', this._landingScrollHandler);
                    this._landingScrollHandler = null;
                }
            }
        };
        if (!location.hostname.includes('localhost') && !location.hostname.startsWith('127.'))
            navigator.serviceWorker.register('service-worker.js?v=5', { updateViaCache: 'none' });
    </script>
</body>

</html>
